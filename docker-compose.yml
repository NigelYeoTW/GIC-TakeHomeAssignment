services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cafe_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ENV: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cafe_manager
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 8000
      ALLOWED_ORIGINS: '["http://localhost"]'
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy  # wait until postgres passes healthcheck

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:8000 
    ports:
      - "80:80"  # only the frontend is exposed to the internet
    depends_on:
      - backend

volumes:
  postgres_data:   # persists database across container restarts
  uploads_data:    # persists uploaded logos across container restarts
